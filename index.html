<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Scanner Dashboard</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
    .header{background:#1a1d2e;border-bottom:1px solid #2d3748;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .header h1{font-size:1.1rem;font-weight:700}.header h1 span{color:#48bb78}
    .status{display:flex;align-items:center;gap:8px;font-size:0.78rem;color:#718096}
    .dot{width:8px;height:8px;border-radius:50%;background:#48bb78;transition:background 0.3s}
    .dot.updating{background:#f6ad55}.dot.error{background:#fc8181}
    .container{max-width:1200px;margin:0 auto;padding:20px}
    .meta{background:#1a1d2e;border:1px solid #2d3748;border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .scan-time{font-size:0.82rem;color:#a0aec0}.scan-time strong{color:#e2e8f0}
    .sectors{display:flex;flex-wrap:wrap;gap:6px}
    .stag{background:#1c3a1c;color:#68d391;border:1px solid #276749;border-radius:4px;padding:2px 8px;font-size:0.72rem;font-weight:600}
    .section{margin-bottom:24px}
    .sh{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #2d3748}
    .sh h2{font-size:0.95rem;font-weight:600}.sh .cnt{background:#2d3748;color:#a0aec0;border-radius:12px;padding:2px 8px;font-size:0.72rem}
    .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
    .card{background:#1a1d2e;border:1px solid #2d3748;border-radius:8px;padding:14px;transition:border-color 0.2s}
    .card:hover{border-color:#4a5568}
    .ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
    .sname{font-weight:600;font-size:0.92rem}.ssym{font-size:0.72rem;color:#718096;margin-top:2px}
    .sprice{font-size:1.05rem;font-weight:700;text-align:right}
    .tags{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0}
    .tag{border-radius:4px;padding:2px 7px;font-size:0.7rem;font-weight:500}
    .tl{background:#1c2a1c;color:#68d391;border:1px solid #276749}
    .tm{background:#2a2016;color:#f6ad55;border:1px solid #7b341e}
    .ts{background:#2a1616;color:#fc8181;border:1px solid #742a2a}
    .tsc{background:#1a365d;color:#63b3ed;border:1px solid #2b6cb0}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px}
    .stat{background:#0f1117;border-radius:4px;padding:6px 8px}
    .sl{font-size:0.65rem;color:#718096;text-transform:uppercase;letter-spacing:0.05em}
    .sv{font-size:0.82rem;font-weight:600;color:#e2e8f0;margin-top:2px}
    .sv.g{color:#68d391}.sv.y{color:#f6ad55}
    .note{font-size:0.72rem;color:#718096;margin-top:8px;padding-top:8px;border-top:1px solid #2d3748}
    .empty{text-align:center;color:#4a5568;padding:20px;font-size:0.85rem}
    .loading{text-align:center;padding:60px 20px;color:#4a5568}
    .spinner{width:28px;height:28px;border:3px solid #2d3748;border-top-color:#48bb78;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .rbar{position:fixed;bottom:16px;right:16px;background:#1a1d2e;border:1px solid #2d3748;border-radius:8px;padding:7px 12px;font-size:0.75rem;color:#718096}
    @media(max-width:600px){.header{flex-direction:column;align-items:flex-start;gap:6px}.meta{flex-direction:column}.cards{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="header">
  <h1>📊 Stock <span>Scanner</span></h1>
  <div class="status"><div class="dot" id="dot"></div><span id="stxt">Loading…</span></div>
</div>
<div class="container">
  <div id="main"><div class="loading"><div class="spinner"></div>Loading latest scan…</div></div>
</div>
<div class="rbar">⟳ Refreshes in <span id="cd">60</span>s</div>
<script>
const URL='https://raw.githubusercontent.com/prjctscp/stock-scanner-dashboard/main/latest_scan.json';
let cd=60,timer;

async function load(){
  setStatus('updating');
  try{
    const r=await fetch(URL+'?t='+Date.now());
    if(!r.ok)throw new Error(r.status);
    render(await r.json());
    setStatus('live');
  }catch(e){setStatus('error');console.error(e);}
  resetCd();
}

function setStatus(s){
  const dot=document.getElementById('dot'),txt=document.getElementById('stxt');
  dot.className='dot'+(s==='updating'?' updating':s==='error'?' error':'');
  txt.textContent=s==='live'?'Live':s==='updating'?'Updating…':'Connection error';
}

function resetCd(){
  cd=60;clearInterval(timer);
  timer=setInterval(()=>{cd--;document.getElementById('cd').textContent=cd;if(cd<=0)load();},1000);
}

function fmt(n){return n==null?'—':Number(n).toLocaleString('en-IN',{maximumFractionDigits:2});}

function capTag(c){
  if(!c)return'';
  const cl=c==='Large Cap'?'tl':c==='Mid Cap'?'tm':'ts';
  return`<span class="tag ${cl}">${c}</span>`;
}

function render(d){
  const alerts=d.alerts||{};
  const sectors=(d.hot_sectors||[]).map(s=>`<span class="stag">🔥 ${s.name} (+${s.outperformance.toFixed(1)}%)</span>`).join('');
  const meta=`<div class="meta">
    <div class="scan-time">Last scan: <strong>${d.scan_time||'—'}</strong></div>
    <div class="sectors">${sectors||'<span style="color:#4a5568;font-size:0.78rem">No hot sectors today</span>'}</div>
  </div>`;

  const secs=[
    {k:'sector_fresh',   e:'🚀',t:'Fresh Sector Breakout',   fn:rFresh},
    {k:'sector_approaching',e:'🔲',t:'Sector Approaching Breakout',fn:rApproach},
    {k:'ema_pullback',   e:'🟢',t:'EMA20 Pullback',          fn:rEMA},
    {k:'approaching',    e:'🟡',t:'Approaching Resistance',  fn:rRes},
    {k:'retest',         e:'🔴',t:'Breakout Retest',         fn:rRetest},
  ];

  const html=secs.map(({k,e,t,fn})=>{
    const items=alerts[k]||[];
    const cards=items.length?`<div class="cards">${items.map(fn).join('')}</div>`:`<div class="empty">No stocks today</div>`;
    return`<div class="section"><div class="sh"><span>${e}</span><h2>${t}</h2><span class="cnt">${items.length}</span></div>${cards}</div>`;
  }).join('');

  document.getElementById('main').innerHTML=meta+html;
}

function rFresh(a){return`<div class="card">
  <div class="ch"><div><div class="sname">${a.name||a.symbol}</div><div class="ssym">${a.symbol}</div></div><div class="sprice">₹${fmt(a.price)}</div></div>
  <div class="tags">${capTag(a.cap_cat)}${a.sector_name?`<span class="tag tsc">${a.sector_name}</span>`:''}</div>
  <div class="stats">
    <div class="stat"><div class="sl">Broke Above</div><div class="sv">₹${fmt(a.upper)}</div></div>
    <div class="stat"><div class="sl">Target</div><div class="sv g">₹${fmt(a.expected_target)} (+${a.expected_pct}%)</div></div>
    <div class="stat"><div class="sl">Volume</div><div class="sv">${a.vol_ratio}x avg</div></div>
    <div class="stat"><div class="sl">Box Range</div><div class="sv">${a.range_pct}%</div></div>
  </div>
  <div class="note">Consolidating since ${a.consolidation_start}</div>
</div>`;}

function rApproach(a){return`<div class="card">
  <div class="ch"><div><div class="sname">${a.name||a.symbol}</div><div class="ssym">${a.symbol}</div></div><div class="sprice">₹${fmt(a.price)}</div></div>
  <div class="tags">${capTag(a.cap_cat)}${a.sector_name?`<span class="tag tsc">${a.sector_name}</span>`:''}</div>
  <div class="stats">
    <div class="stat"><div class="sl">Resistance</div><div class="sv">₹${fmt(a.upper)}</div></div>
    <div class="stat"><div class="sl">Distance</div><div class="sv y">${a.pct_from_top}% away</div></div>
    <div class="stat"><div class="sl">Target</div><div class="sv g">₹${fmt(a.expected_target)} (+${a.expected_pct}%)</div></div>
    <div class="stat"><div class="sl">Box Range</div><div class="sv">${a.range_pct}%</div></div>
  </div>
  <div class="note">Consolidating since ${a.consolidation_start}${a.vol_drying?' · Vol drying ✓':''}</div>
</div>`;}

function rEMA(a){return`<div class="card">
  <div class="ch"><div><div class="sname">${a.name||a.symbol}</div><div class="ssym">${a.symbol}</div></div><div class="sprice">₹${fmt(a.price)}</div></div>
  <div class="stats">
    <div class="stat"><div class="sl">EMA20</div><div class="sv">₹${fmt(a.ema20)}</div></div>
    <div class="stat"><div class="sl">Above EMA</div><div class="sv g">${a.pct_above_ema}%</div></div>
    <div class="stat"><div class="sl">EMA50</div><div class="sv">₹${fmt(a.ema50)}</div></div>
    <div class="stat"><div class="sl">Volume</div><div class="sv">${a.vol_ratio}x avg</div></div>
  </div>
</div>`;}

function rRes(a){return`<div class="card">
  <div class="ch"><div><div class="sname">${a.name||a.symbol}</div><div class="ssym">${a.symbol}</div></div><div class="sprice">₹${fmt(a.price)}</div></div>
  <div class="stats">
    <div class="stat"><div class="sl">Resistance</div><div class="sv">₹${fmt(a.resistance)}</div></div>
    <div class="stat"><div class="sl">Distance</div><div class="sv y">${a.pct_away}% away</div></div>
    <div class="stat"><div class="sl">Volume</div><div class="sv">${a.vol_ratio}x avg</div></div>
    <div class="stat"><div class="sl">Formed</div><div class="sv">${a.formed_date||'—'}</div></div>
  </div>
</div>`;}

function rRetest(a){return`<div class="card">
  <div class="ch"><div><div class="sname">${a.name||a.symbol}</div><div class="ssym">${a.symbol}</div></div><div class="sprice">₹${fmt(a.price)}</div></div>
  <div class="stats">
    <div class="stat"><div class="sl">Support</div><div class="sv">₹${fmt(a.support)}</div></div>
    <div class="stat"><div class="sl">Distance</div><div class="sv y">${a.pct_away}% away</div></div>
    <div class="stat"><div class="sl">Tested</div><div class="sv">${a.touch_count}x</div></div>
    <div class="stat"><div class="sl">Broke Out</div><div class="sv">${a.breakout_date||'—'}</div></div>
  </div>
  <div class="note">Formed ${a.formed_date||'—'}</div>
</div>`;}

load();
</script>
</body>
</html>
